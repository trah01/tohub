<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToHub</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <p class="eyebrow">Docker Hub 与 GitHub 中转代理</p>
        <h1>ToHub</h1>
        <p class="summary">把当前域名配置为 Docker Registry Mirror，并将 GitHub 链接转换为可代理访问的地址。</p>
        <a class="github-button" href="https://github.com/trah01/tohub" target="_blank" rel="noreferrer">
          <svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16">
            <path d="M8 0C3.58 0 0 3.67 0 8.19c0 3.61 2.29 6.67 5.47 7.75.4.08.55-.18.55-.39v-1.38c-2.23.5-2.7-1.1-2.7-1.1-.36-.94-.89-1.19-.89-1.19-.73-.51.06-.5.06-.5.8.06 1.23.84 1.23.84.72 1.26 1.88.9 2.34.69.07-.53.28-.9.51-1.1-1.78-.21-3.65-.91-3.65-4.05 0-.9.31-1.63.82-2.2-.08-.21-.36-1.05.08-2.18 0 0 .68-.22 2.2.84A7.42 7.42 0 0 1 8 3.95c.68 0 1.36.09 1.99.27 1.52-1.06 2.2-.84 2.2-.84.44 1.13.16 1.97.08 2.18.51.57.82 1.3.82 2.2 0 3.15-1.88 3.84-3.66 4.04.29.26.54.76.54 1.53v2.22c0 .21.14.47.55.39A8.08 8.08 0 0 0 16 8.19C16 3.67 12.42 0 8 0Z"></path>
          </svg>
          <span>GitHub 项目</span>
        </a>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Docker daemon.json</h2>
          <button class="icon-button" id="copyDockerConfig" type="button" aria-label="复制 Docker 配置">
            <span aria-hidden="true">Copy</span>
          </button>
        </div>
        <pre><code id="dockerConfig"></code></pre>
        <p class="note">保存后重启 Docker 服务，然后继续使用原有的 docker pull 命令。</p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>GitHub 代理访问</h2>
          <a class="button-link" id="githubHome" href="/github/" target="_blank" rel="noreferrer">访问首页</a>
        </div>
        <form class="converter" id="githubForm">
          <label for="githubInput">GitHub URL 或路径</label>
          <div class="input-row">
            <input id="githubInput" name="githubInput" type="text" placeholder="github.com/trah01 或 trah01/tohub">
            <button type="submit">转换</button>
          </div>
        </form>
        <div class="result" id="githubResult" hidden>
          <span id="githubProxyURL"></span>
          <a id="githubOpen" href="/" target="_blank" rel="noreferrer">打开</a>
        </div>
      </section>
    </main>
    <script src="/assets/app.js"></script>
  </body>
</html>
